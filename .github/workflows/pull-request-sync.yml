name: Sync PR Status

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  sync-pr-status:
    runs-on: ubuntu-latest
    env:
      GITHUB_REPOSITORY_NAME: ${{ github.repository }}
      GITHUB_PROJECT_ID: ${{ vars.GITHUB_PROJECT_ID }}
      GITHUB_PROJECT_STATUS_FIELD_ID: ${{ vars.GITHUB_PROJECT_STATUS_FIELD_ID }}
      GITHUB_PROJECT_STATUS_TODO_OPTION_ID: ${{ vars.GITHUB_PROJECT_STATUS_TODO_OPTION_ID }}
      GITHUB_PROJECT_STATUS_IN_PROGRESS_OPTION_ID: ${{ vars.GITHUB_PROJECT_STATUS_IN_PROGRESS_OPTION_ID }}
      GITHUB_PROJECT_STATUS_IN_REVIEW_OPTION_ID: ${{ vars.GITHUB_PROJECT_STATUS_IN_REVIEW_OPTION_ID }}
      GITHUB_PROJECT_STATUS_DONE_OPTION_ID: ${{ vars.GITHUB_PROJECT_STATUS_DONE_OPTION_ID }}
      GITHUB_PROJECT_STATUS_BLOCKED_OPTION_ID: ${{ vars.GITHUB_PROJECT_STATUS_BLOCKED_OPTION_ID }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync linked issue status
        run: node scripts/sync-pr-status.mjs
